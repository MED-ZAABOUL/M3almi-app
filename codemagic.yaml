workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      vars:
        FVM_VERSION: "stable"
    scripts:
      - name: Unzip and Extract Project
        script: |
          echo "Unzipping all files..."
          unzip -o *.zip 2>/dev/null || true
          cp -r m3almi_flutter/* . 2>/dev/null || true
          cp -r m3almi/* . 2>/dev/null || true
          
      - name: Auto-Upgrade Android Files (AI Fix)
        script: |
          echo "Upgrading Gradle Wrapper to 7.5..."
          find . -name "gradle-wrapper.properties" -exec sed -i '' 's/gradle-[0-9.]*-all.zip/gradle-7.5-all.zip/g' {} + 2>/dev/null || true
          find . -name "gradle-wrapper.properties" -exec sed -i 's/gradle-[0-9.]*-all.zip/gradle-7.5-all.zip/g' {} + 2>/dev/null || true
          
          echo "Upgrading Android Build Tools Gradle to 7.2.0..."
          find . -name "build.gradle" -exec sed -i '' 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:7.2.0/g' {} + 2>/dev/null || true
          find . -name "build.gradle" -exec sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:7.2.0/g' {} + 2>/dev/null || true
          
          echo "Ensuring correct Java Version alignment..."
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 33/g' {} + 2>/dev/null || true
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 33/g' {} + 2>/dev/null || true

      - name: Get Flutter packages
        script: |
          flutter pub get
          
      - name: Build Flutter APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
