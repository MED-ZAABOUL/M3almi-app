workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      vars:
        FVM_VERSION: "stable"
    scripts:
      - name: Unzip and Extract Project
        script: |
          echo "Unzipping project files..."
          unzip -o *.zip 2>/dev/null || true
          cp -r m3almi_flutter/* . 2>/dev/null || true
          cp -r m3almi/* . 2>/dev/null || true
          
      - name: Recreate Android Folder (Force Fix)
        script: |
          echo "Removing old corrupted android folder..."
          rm -rf android
          
          echo "Re-generating fresh and modern android structure..."
          flutter create . --platforms=android
          
      - name: Get Flutter packages
        script: |
          flutter pub get
          
      - name: Build Flutter APK
        script: |
          echo "Trying to build Release APK..."
          flutter build apk --release --no-sound-null-safety || { echo "Release failed, trying Debug APK..."; flutter build apk --debug --no-sound-null-safety; }
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/debug/*.apk
