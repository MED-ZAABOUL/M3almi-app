workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      vars:
        FVM_VERSION: "3.10.6"
    scripts:
      - name: Unzip Project
        script: |
          unzip *.zip 2>/dev/null || true
          cp -r m3almi_flutter/* . 2>/dev/null || true
          cp -r m3almi/* . 2>/dev/null || true
      - name: Set Java 11 for Older Gradle
        script: |
          echo "Switching to Java 11..."
          sudo ln -sfn /usr/local/opt/openjdk@11/libexec/openjdk.jdk /Library/Java/JavaVirtualMachines/openjdk-11.jdk 2>/dev/null || true
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Flutter APK
        script: |
          flutter build apk --release --no-sound-null-safety
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
